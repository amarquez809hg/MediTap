# Local / LAN dev: publish backend, SPA, and Keycloak on the host.
# Docker Compose merges this with docker-compose.yml (it does not use !reset).
#
#   cd docker
#   docker compose -f docker-compose.yml -f docker-compose.local-ports.yml up -d --build

services:
  backend:
    ports:
      - "8080:8000"
  frontend:
    ports:
      - "8100:8100"
  auth:
    ports:
      - "8081:8080"
