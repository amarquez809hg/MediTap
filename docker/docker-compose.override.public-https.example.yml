# GCP / public IP: HTTPS on ports 8100, 8080, 8081 via Caddy (self-signed).
# Base docker-compose.yml does NOT publish app ports; this file adds Caddy only (no !reset).
#
#   cd docker
#   cp docker-compose.override.public-https.example.yml docker-compose.override.yml
#
# In .env: MEDITAP_PUBLIC_HOST, MEDITAP_PUBLIC_SCHEME=https,
#          MEDITAP_CORS_EXTRA_ORIGINS=https://YOUR_IP:8100
# Then:
#   docker compose run --rm keycloak-config
#   docker compose up -d --build
#
# Open: https://YOUR_IP:8100/tab3  (https:// required)

services:
  auth:
    environment:
      KC_PROXY_HEADERS: xforwarded

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    # Load MEDITAP_PUBLIC_HOST from docker/.env into the container. Do not use Compose
    # `environment: ${MEDITAP_PUBLIC_HOST}` here — that overrides env_file and can bake
    # in 127.0.0.1 if the variable is missing at *compose parse* time.
    env_file:
      - .env
    ports:
      - "8100:443"
      - "8081:4443"
      - "8080:4455"
    volumes:
      - ./caddy/Caddyfile.public:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - frontend
      - auth
      - backend

volumes:
  caddy_data: {}
