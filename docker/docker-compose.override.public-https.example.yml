# GCP / public IP: HTTPS on app ports via Caddy (self-signed). MediTap auth is Django + JWT (no Keycloak).
# Base docker-compose.yml does not publish app ports; this file adds Caddy.
#
#   cd docker
#   cp docker-compose.override.public-https.example.yml docker-compose.override.yml
#
# In .env: MEDITAP_PUBLIC_HOST, MEDITAP_PUBLIC_SCHEME=https,
#          MEDITAP_CORS_EXTRA_ORIGINS=https://YOUR_IP:8100
# Then: docker compose up -d --build
#
# Open: https://YOUR_IP:8100/tab3

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8100:443"
      - "8080:4455"
    volumes:
      - ./caddy/Caddyfile.public:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data: {}
