services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: meditap
      POSTGRES_USER: meditap_user
      POSTGRES_PASSWORD: meditap_pass
    ports:
      - "5432:5432"              # optional; remove if it conflicts with local Postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..                # repo root
      dockerfile: docker/Dockerfile.backend
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app          # your Django code
    env_file:
      - ./backend.dev.env
      - ./.env
    environment:
      DATABASE_URL: postgres://meditap_user:meditap_pass@db:5432/meditap
      DEBUG: "True"
      SECRET_KEY: dev-secret
      ALLOWED_HOSTS: "*"
      MEDITAP_PUBLIC_HOST: ${MEDITAP_PUBLIC_HOST:-}
      MEDITAP_CORS_EXTRA_ORIGINS: ${MEDITAP_CORS_EXTRA_ORIGINS:-}
    depends_on:
      db:
        condition: service_started

  frontend:
    build:
      context: ..                # repo root
      dockerfile: docker/Dockerfile.frontend
    working_dir: /app
    command: ["sh", "-lc", "npm install && npx @ionic/cli serve --external --host=0.0.0.0 --port=8100"]
    volumes:
      - ../meditap-app:/app
      - frontend_node_modules:/app/node_modules
    environment:
      BROWSER: "none"
    depends_on:
      backend:
        condition: service_started

volumes:
  pg_data:
  frontend_node_modules:
